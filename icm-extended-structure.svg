<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1080" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3fb950"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f85149"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d29922"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="1080" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="700">Extended ICM — Filling the Gaps</text>
  <text x="480" y="56" text-anchor="middle" fill="#7d8590" font-size="12">Van Clief's principles + branching, parallelism, state, tools, observability</text>

  <!-- Legend -->
  <rect x="580" y="66" width="360" height="28" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  <rect x="592" y="74" width="10" height="10" rx="2" fill="#1f6feb"/>
  <text x="608" y="83" fill="#7d8590" font-size="10">ICM original</text>
  <rect x="690" y="74" width="10" height="10" rx="2" fill="#f85149"/>
  <text x="706" y="83" fill="#7d8590" font-size="10">New addition</text>
  <rect x="790" y="74" width="10" height="10" rx="2" fill="#8b5cf6"/>
  <text x="806" y="83" fill="#7d8590" font-size="10">Enhanced</text>

  <!-- ============ ROOT SECTION ============ -->
  <rect x="24" y="100" width="912" height="74" rx="8" fill="#1c2333" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <text x="44" y="126" fill="#e6edf3" font-size="15" font-weight="600">📂 workspace/</text>

  <!-- CONTEXT.md -->
  <rect x="180" y="110" width="200" height="52" rx="6" fill="#0d1117" stroke="#1f6feb" stroke-width="1"/>
  <text x="196" y="132" fill="#7ee787" font-size="12" font-weight="600">📄 CONTEXT.md</text>
  <text x="196" y="150" fill="#7d8590" font-size="10">Root contract + project overview</text>

  <!-- ROUTER.yaml (NEW) -->
  <rect x="396" y="110" width="230" height="52" rx="6" fill="#0d1117" stroke="#f85149" stroke-width="1.5"/>
  <text x="412" y="132" fill="#f85149" font-size="12" font-weight="600">📄 ROUTER.yaml ✦ NEW</text>
  <text x="412" y="150" fill="#7d8590" font-size="10">Stage DAG: branches, parallels, loops</text>

  <!-- env.example (NEW) -->
  <rect x="642" y="110" width="200" height="52" rx="6" fill="#0d1117" stroke="#f85149" stroke-width="1.5"/>
  <text x="658" y="132" fill="#f85149" font-size="12" font-weight="600">📄 env.example ✦ NEW</text>
  <text x="658" y="150" fill="#7d8590" font-size="10">Environment variable template</text>

  <!-- ============ MAIN GRID ============ -->

  <!-- LEFT COLUMN: Infrastructure -->
  <rect x="24" y="188" width="210" height="530" rx="8" fill="#1c2333" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <text x="44" y="214" fill="#8b949e" font-size="13" font-weight="700">Infrastructure</text>

  <!-- _config/ (ICM) -->
  <rect x="36" y="228" width="186" height="70" rx="6" fill="#0d1117" stroke="#1f6feb" stroke-width="1"/>
  <text x="50" y="250" fill="#d2a8ff" font-size="12" font-weight="600">📁 _config/</text>
  <text x="50" y="268" fill="#7d8590" font-size="10">Brand, voice, design</text>
  <text x="50" y="284" fill="#58a6ff" font-size="9">ICM original</text>

  <!-- _tools/ (NEW) -->
  <rect x="36" y="308" width="186" height="96" rx="6" fill="#0d1117" stroke="#f85149" stroke-width="1.5"/>
  <text x="50" y="330" fill="#f85149" font-size="12" font-weight="600">📁 _tools/ ✦ NEW</text>
  <text x="50" y="348" fill="#7d8590" font-size="10">Tool definitions for agent</text>
  <text x="50" y="366" fill="#7ee787" font-size="10">📄 CONTEXT.md</text>
  <text x="50" y="382" fill="#8b949e" font-size="10">web-search / code-exec / api-call</text>
  <text x="50" y="396" fill="#7d8590" font-size="9">Each tool = markdown contract</text>

  <!-- _state/ (NEW) -->
  <rect x="36" y="414" width="186" height="104" rx="6" fill="#0d1117" stroke="#f85149" stroke-width="1.5"/>
  <text x="50" y="436" fill="#f85149" font-size="12" font-weight="600">📁 _state/ ✦ NEW</text>
  <text x="50" y="454" fill="#7d8590" font-size="10">Persistent memory across runs</text>
  <text x="50" y="474" fill="#fbbf24" font-size="10">📄 memory.jsonl</text>
  <text x="50" y="490" fill="#fbbf24" font-size="10">📄 variables.yaml</text>
  <text x="50" y="506" fill="#fbbf24" font-size="10">📁 checkpoints/</text>

  <!-- _logs/ (NEW) -->
  <rect x="36" y="528" width="186" height="86" rx="6" fill="#0d1117" stroke="#f85149" stroke-width="1.5"/>
  <text x="50" y="550" fill="#f85149" font-size="12" font-weight="600">📁 _logs/ ✦ NEW</text>
  <text x="50" y="568" fill="#7d8590" font-size="10">Observability layer</text>
  <text x="50" y="586" fill="#fbbf24" font-size="10">📁 runs/</text>
  <text x="108" y="586" fill="#7d8590" font-size="10">tokens, cost, timing</text>
  <text x="50" y="602" fill="#fbbf24" font-size="10">📁 errors/</text>
  <text x="108" y="602" fill="#7d8590" font-size="10">error traces</text>

  <!-- shared/ + skills/ + setup/ (ICM) -->
  <rect x="36" y="624" width="186" height="82" rx="6" fill="#0d1117" stroke="#1f6feb" stroke-width="1"/>
  <text x="50" y="646" fill="#fbbf24" font-size="12" font-weight="600">📁 shared/</text>
  <text x="130" y="646" fill="#7d8590" font-size="10">Cross-stage</text>
  <text x="50" y="666" fill="#fb923c" font-size="12" font-weight="600">📁 skills/</text>
  <text x="130" y="666" fill="#7d8590" font-size="10">Domain knowledge</text>
  <text x="50" y="686" fill="#8b949e" font-size="12" font-weight="600">📁 setup/</text>
  <text x="130" y="686" fill="#7d8590" font-size="10">Onboarding</text>
  <text x="50" y="700" fill="#58a6ff" font-size="9">ICM original</text>

  <!-- ============ RIGHT SECTION: Stage Flow ============ -->
  <rect x="248" y="188" width="688" height="530" rx="8" fill="#1c2333" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <text x="268" y="214" fill="#e6edf3" font-size="13" font-weight="700">📁 stages/</text>
  <text x="340" y="214" fill="#7d8590" font-size="11">— Sequential + Branching + Parallel flow</text>

  <!-- Stage 01: Research -->
  <rect x="268" y="230" width="300" height="100" rx="6" fill="#0d1117" stroke="#1f6feb" stroke-width="1"/>
  <rect x="268" y="230" width="4" height="100" rx="2" fill="#1f6feb"/>
  <text x="286" y="254" fill="#58a6ff" font-size="13" font-weight="600">📁 01-research/</text>
  <text x="286" y="274" fill="#7ee787" font-size="11">📄 CONTEXT.md</text>
  <text x="400" y="274" fill="#7d8590" font-size="10">Stage contract</text>
  <text x="286" y="292" fill="#f85149" font-size="11">📄 GATE.md ✦</text>
  <text x="400" y="292" fill="#7d8590" font-size="10">Entry/exit validation</text>
  <text x="286" y="310" fill="#d2a8ff" font-size="11">📁 references/</text>
  <text x="400" y="310" fill="#3fb950" font-size="11">📁 output/</text>
  <text x="470" y="310" fill="#f85149" font-size="11">📁 fallback/ ✦</text>

  <!-- ROUTER decision diamond after 01 -->
  <polygon points="418,350 450,370 418,390 386,370" fill="#0d1117" stroke="#d29922" stroke-width="1.5"/>
  <text x="418" y="374" text-anchor="middle" fill="#d29922" font-size="9" font-weight="600">ROUTE</text>

  <!-- Arrow from 01 to diamond -->
  <path d="M418 330 L418 348" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Branch label: condition met -->
  <text x="460" y="364" fill="#3fb950" font-size="9">condition A</text>
  <!-- Branch label: condition not met -->
  <text x="460" y="382" fill="#fbbf24" font-size="9">condition B</text>

  <!-- Arrow from diamond down to Stage 02 (default path) -->
  <path d="M418 390 L418 410" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Arrow from diamond right to skip stage (branch) -->
  <path d="M450 370 L590 370 L590 458" stroke="#d29922" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowYellow)"/>
  <text x="510" y="362" fill="#d29922" font-size="9">skip to 03 →</text>

  <!-- Stage 02: Analyze -->
  <rect x="268" y="412" width="300" height="80" rx="6" fill="#0d1117" stroke="#1f6feb" stroke-width="1"/>
  <rect x="268" y="412" width="4" height="80" rx="2" fill="#1f6feb"/>
  <text x="286" y="436" fill="#58a6ff" font-size="13" font-weight="600">📁 02-analyze/</text>
  <text x="286" y="456" fill="#7ee787" font-size="11">📄 CONTEXT.md</text>
  <text x="286" y="474" fill="#f85149" font-size="11">📄 GATE.md ✦</text>
  <text x="380" y="474" fill="#d2a8ff" font-size="11">references/</text>
  <text x="460" y="474" fill="#3fb950" font-size="11">output/</text>
  <text x="516" y="474" fill="#f85149" font-size="11">fallback/ ✦</text>

  <!-- Arrow from 02 down to parallel group -->
  <path d="M418 492 L418 510" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Stage 03: Parallel group -->
  <rect x="268" y="512" width="640" height="120" rx="6" fill="#0d1117" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="268" y="512" width="4" height="120" rx="2" fill="#8b5cf6"/>
  <text x="286" y="536" fill="#d2a8ff" font-size="13" font-weight="600">📁 03-parallel/ ✦ NEW PATTERN</text>
  <text x="510" y="536" fill="#7d8590" font-size="10">Sub-stages run concurrently — CONTEXT.md defines fork/join</text>

  <!-- 03a -->
  <rect x="286" y="546" width="285" height="72" rx="4" fill="#151b28" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="302" y="568" fill="#a78bfa" font-size="12" font-weight="600">📁 03a-draft-copy/</text>
  <text x="302" y="586" fill="#7ee787" font-size="10">CONTEXT.md</text>
  <text x="380" y="586" fill="#f85149" font-size="10">GATE.md ✦</text>
  <text x="302" y="604" fill="#d2a8ff" font-size="10">references/</text>
  <text x="380" y="604" fill="#3fb950" font-size="10">output/</text>

  <!-- 03b -->
  <rect x="586" y="546" width="305" height="72" rx="4" fill="#151b28" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="602" y="568" fill="#a78bfa" font-size="12" font-weight="600">📁 03b-draft-visuals/</text>
  <text x="602" y="586" fill="#7ee787" font-size="10">CONTEXT.md</text>
  <text x="686" y="586" fill="#f85149" font-size="10">GATE.md ✦</text>
  <text x="602" y="604" fill="#d2a8ff" font-size="10">references/</text>
  <text x="686" y="604" fill="#3fb950" font-size="10">output/</text>

  <!-- Parallel arrows (fork) -->
  <text x="578" y="560" fill="#8b5cf6" font-size="14" font-weight="700">⟷</text>

  <!-- Arrow from parallel down to 04 -->
  <path d="M418 632 L418 650" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Stage 04: Review -->
  <rect x="268" y="652" width="300" height="52" rx="6" fill="#0d1117" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="268" y="652" width="4" height="52" rx="2" fill="#8b5cf6"/>
  <text x="286" y="676" fill="#8b5cf6" font-size="13" font-weight="600">📁 04-review/ ✦ ENHANCED</text>
  <text x="286" y="694" fill="#7d8590" font-size="10">GATE.md validates quality — can reject back to 03</text>

  <!-- Feedback loop arrow from 04 back to 03 -->
  <path d="M268 680 L248 680 L248 570 L268 570" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <text x="234" y="628" fill="#f85149" font-size="9" font-weight="600" transform="rotate(-90, 234, 628)">reject → redo</text>

  <!-- Arrow from 04 to 05 -->
  <path d="M418 704 L418 718" stroke="#3fb950" stroke-width="1.5"/>

  <!-- ============ BOTTOM SECTION ============ -->

  <!-- ROUTER.yaml detail -->
  <rect x="24" y="732" width="912" height="140" rx="8" fill="#1c2333" stroke="#d29922" stroke-width="1" filter="url(#shadow)"/>
  <text x="44" y="758" fill="#d29922" font-size="13" font-weight="700">📄 ROUTER.yaml — The Missing Piece</text>
  <text x="270" y="758" fill="#7d8590" font-size="11">Defines the DAG of stage transitions (what ICM left implicit)</text>

  <!-- Router code block -->
  <rect x="36" y="768" width="430" height="92" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  <text x="50" y="786" fill="#7ee787" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">stages:</text>
  <text x="66" y="802" fill="#e6edf3" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">01-research:</text>
  <text x="82" y="818" fill="#58a6ff" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">next: 02-analyze</text>
  <text x="82" y="834" fill="#d29922" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">branch_if: {output_has: "skip"} → 03-parallel</text>
  <text x="82" y="850" fill="#f85149" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">max_retries: 2</text>

  <rect x="482" y="768" width="442" height="92" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  <text x="496" y="786" fill="#e6edf3" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">03-parallel:</text>
  <text x="512" y="802" fill="#8b5cf6" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">mode: parallel</text>
  <text x="512" y="818" fill="#e6edf3" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">sub: [03a-draft-copy, 03b-draft-visuals]</text>
  <text x="496" y="838" fill="#e6edf3" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">04-review:</text>
  <text x="512" y="854" fill="#f85149" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">reject_to: 03-parallel  # feedback loop</text>

  <!-- ============ GATE.md detail ============ -->
  <rect x="24" y="886" width="444" height="100" rx="8" fill="#1c2333" stroke="#f85149" stroke-width="1" filter="url(#shadow)"/>
  <text x="44" y="912" fill="#f85149" font-size="13" font-weight="700">📄 GATE.md — Stage Validation</text>

  <rect x="36" y="922" width="420" height="52" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  <text x="50" y="940" fill="#7ee787" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">entry: [output/01-research exists]</text>
  <text x="50" y="958" fill="#7ee787" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">exit:  [word_count > 500, tone == brand_voice]</text>

  <!-- _state/ detail -->
  <rect x="492" y="886" width="444" height="100" rx="8" fill="#1c2333" stroke="#f85149" stroke-width="1" filter="url(#shadow)"/>
  <text x="512" y="912" fill="#f85149" font-size="13" font-weight="700">📁 _state/ — Persistent Memory</text>

  <rect x="504" y="922" width="420" height="52" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  <text x="518" y="940" fill="#fbbf24" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">memory.jsonl   → append-only run history</text>
  <text x="518" y="958" fill="#fbbf24" font-size="11" font-family="'JetBrains Mono', 'Fira Code', monospace">checkpoints/   → resume from any stage</text>

  <!-- ============ PRINCIPLES COMPARISON ============ -->
  <rect x="24" y="1000" width="912" height="66" rx="8" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
  <text x="44" y="1024" fill="#e6edf3" font-size="12" font-weight="700">What's preserved from ICM:</text>
  <text x="250" y="1024" fill="#58a6ff" font-size="11">Minimal context loading</text>
  <text x="420" y="1024" fill="#58a6ff" font-size="11">Single source of truth</text>
  <text x="580" y="1024" fill="#58a6ff" font-size="11">One-way references</text>
  <text x="730" y="1024" fill="#58a6ff" font-size="11">Filesystem-first</text>

  <text x="44" y="1048" fill="#e6edf3" font-size="12" font-weight="700">What's added:</text>
  <text x="250" y="1048" fill="#f85149" font-size="11">Conditional routing</text>
  <text x="400" y="1048" fill="#f85149" font-size="11">Parallel stages</text>
  <text x="520" y="1048" fill="#f85149" font-size="11">Feedback loops</text>
  <text x="640" y="1048" fill="#f85149" font-size="11">State + Tools</text>
  <text x="760" y="1048" fill="#f85149" font-size="11">Observability</text>

  <!-- Attribution -->
  <text x="480" y="1076" text-anchor="middle" fill="#484f58" font-size="10">Extended ICM — Building on Van Clief's Model Workspace Protocol with production-grade additions</text>
</svg>